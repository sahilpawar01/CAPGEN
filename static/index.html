<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BLIP image caption</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="card">
    <h1>Image → caption</h1>
    <p class="lede">Upload a photo. The server runs <strong>Salesforce BLIP</strong> and returns a short description.</p>

    <form id="form" class="form">
      <label class="file-label">
        <input type="file" id="file" name="file" accept="image/*" required />
        <span>Choose image</span>
      </label>
      <button type="submit" id="submit" disabled>Get caption</button>
    </form>

    <div id="preview" class="preview" hidden>
      <img id="previewImg" alt="Preview" />
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>
    <p id="result" class="result" hidden></p>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
